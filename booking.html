<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parudeesa Booking Form</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,600;1,600&display=swap');

body{
    margin:0;
    padding:0;
    font-family:'Josefin Sans',sans-serif;
    background:linear-gradient(135deg,#fff8f2,#fde9d8);
}

.form-container{
    width:90%;
    max-width:700px;
    margin:40px auto;
    background:#fff3ec;
    padding:35px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    border:1px solid rgba(250,135,62,.15);
}

h1{
    text-align:center;
    font-family:'Cormorant Garamond',serif;
    font-size:36px;
    color:#8a4b1f;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#8b6040;
    margin-bottom:30px;
    font-size:14px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
    color:#6a3b1c;
    font-weight:600;
}

input,select,textarea{
    width:100%;
    padding:12px 14px;
    border:1px solid rgba(250,135,62,.25);
    border-radius:12px;
    font-size:14px;
    font-family:'Josefin Sans',sans-serif;
    background:#fff;
    box-sizing:border-box;
    outline:none;
}

input:focus,select:focus,textarea:focus{
    border-color:#fa873e;
    box-shadow:0 0 0 3px rgba(250,135,62,.12);
}

textarea{
    resize:none;
    min-height:90px;
}

.checkbox-group{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:8px;
}

.checkbox-group label{
    display:flex;
    align-items:center;
    gap:8px;
    background:#fff;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid rgba(250,135,62,.15);
    cursor:pointer;
    font-weight:400;
    transition:all .3s ease;
}

.checkbox-group label:hover{
    background:rgba(250,135,62,.05);
    border-color:rgba(250,135,62,.3);
}

.checkbox-group input{
    width:auto;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#fa873e,#d96520);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
    transition:opacity .3s ease,transform .3s ease;
}

button:hover{
    opacity:0.95;
    transform:translateY(-2px);
}

.success-message{
    margin-top:20px;
    background:#fff;
    border-left:4px solid #fa873e;
    padding:15px;
    color:#6a3b1c;
    display:none;
    border-radius:10px;
    line-height:1.6;
    animation:slideIn .4s ease;
}

@keyframes slideIn{
    from{
        opacity:0;
        transform:translateY(-10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="form-container">
    <h1>Book Your Stay</h1>
    <div class="subtitle">Reserve your perfect lakeside staycation at Parudeesa</div>

    <form id="bookingForm">

        <div class="form-group">
            <label>Select Property</label>
            <select id="property_id" name="property_id" required>
                <option value="">Choose Property</option>
                                <option value="1">Parudeesa_The_Paradise - ₹6,500/night</option>
                                <option value="2">Parudeesa Utopiya - ₹9,000/night</option>
                            </select>
        </div>

        <div class="form-group">
            <label>Check-in Date</label>
            <input type="date" id="check_in" name="check_in" required>
        </div>

        <div class="form-group">
            <label>Check-out Date</label>
            <input type="date" id="check_out" name="check_out" required>
        </div>

        <div class="form-group">
            <label>Number of Guests</label>
            <input type="number" id="guests" name="guests" placeholder="Enter guest count" required>
        </div>

        <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter phone number" required>
        </div>

        <button type="submit">Confirm Booking</button>
    </form>

    <div class="success-message" id="successMsg"></div>
</div>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e){
    e.preventDefault();

    const formData = new FormData(this);

    fetch('/bookings', {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRF-TOKEN': '1PH1TcdwCj64uu6xOmkFjIiVTKSGxAPxtF3M5uG6',
            'Accept': 'application/json'
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            let msg = `
                <strong>✅ Booking request submitted successfully!</strong><br><br>
                <strong>Name:</strong> ${formData.get('name')}<br>
                <strong>Email:</strong> ${formData.get('email')}<br>
                <strong>Phone:</strong> ${formData.get('phone')}<br>
                <strong>Property ID:</strong> ${formData.get('property_id')}<br>
                <strong>Check-in:</strong> ${formData.get('check_in')}<br>
                <strong>Check-out:</strong> ${formData.get('check_out')}<br>
                <strong>Guests:</strong> ${formData.get('guests')}<br><br>
                Our team will contact you shortly.
            `;

            let successBox = document.getElementById("successMsg");
            successBox.innerHTML = msg;
            successBox.style.display = "block";

            document.getElementById("bookingForm").reset();
            
            // Scroll to success message
            setTimeout(() => {
                successBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 200);
        } else {
            alert('Error submitting booking. Please try again.');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Error submitting booking. Please try again.');
    });
});
</script>

</body>
</html>
