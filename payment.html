<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Checkout</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --amber:    #E8812A;
      --amber-lt: #F5A55C;
      --amber-dk: #C46318;
      --ink:      #1A1410;
      --smoke:    #F8F3EE;
      --cream:    #FFFCF8;
      --muted:    #9A8E84;
      --border:   #E4DAD0;
      --success:  #2D7A52;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--smoke);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* ── Animated Background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 90%, rgba(232,129,42,.13) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 90% 10%, rgba(232,129,42,.09) 0%, transparent 55%),
        var(--smoke);
      z-index: 0;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      background: var(--cream);
      border-radius: 20px;
      box-shadow:
        0 2px 4px rgba(0,0,0,.04),
        0 12px 40px rgba(0,0,0,.10),
        0 40px 80px rgba(0,0,0,.06),
        inset 0 1px 0 rgba(255,255,255,.9);
      overflow: hidden;
      animation: cardIn .6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    /* ── Header Band ── */
    .card-header {
      background: linear-gradient(135deg, var(--amber-dk) 0%, var(--amber) 55%, var(--amber-lt) 100%);
      padding: 28px 32px 24px;
      position: relative;
      overflow: hidden;
    }
    .card-header::after {
      content: '';
      position: absolute;
      right: -20px; bottom: -30px;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
    }
    .card-header::before {
      content: '';
      position: absolute;
      right: 40px; bottom: -50px;
      width: 90px; height: 90px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .brand-icon {
      width: 34px; height: 34px;
      background: rgba(255,255,255,.2);
      border-radius: 8px;
      display: grid;
      place-items: center;
      backdrop-filter: blur(4px);
    }
    .brand-icon svg { width: 18px; height: 18px; fill: #fff; }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      color: rgba(255,255,255,.9);
      letter-spacing: .02em;
    }

    .header-amount {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .header-label {
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.65);
      font-weight: 500;
    }
    .header-value {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      color: #fff;
      font-weight: 700;
      line-height: 1;
    }

    .secure-badge {
      position: absolute;
      top: 20px; right: 24px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: rgba(255,255,255,.75);
      background: rgba(255,255,255,.15);
      padding: 5px 10px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }
    .secure-badge svg { width: 11px; height: 11px; fill: rgba(255,255,255,.75); }

    /* ── Body ── */
    .card-body { padding: 28px 32px 32px; }

    /* ── Step indicator ── */
    .steps {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 28px;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
    }
    .step.active { color: var(--amber); }
    .step-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid currentColor;
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .step.active .step-dot {
      background: var(--amber);
      border-color: var(--amber);
      color: #fff;
    }
    .step-line {
      flex: 1;
      height: 1px;
      background: var(--border);
      margin: 0 8px;
    }

    /* ── Form ── */
    .section-label {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 14px;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 13px;
      width: 16px; height: 16px;
      color: var(--muted);
      pointer-events: none;
      display: grid; place-items: center;
    }
    .input-icon svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

    .field input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      background: #fff;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .field input::placeholder { color: #C4B9B0; }
    .field input:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(232,129,42,.12);
    }
    .field input.readonly-field {
      background: var(--smoke);
      color: var(--amber-dk);
      font-weight: 600;
      font-size: 15px;
      cursor: default;
      border-color: var(--border);
    }

    /* ── Payment Methods ── */
    .method-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    .method-option { position: relative; }
    .method-option input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .method-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      padding: 14px 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color .2s, background .2s, box-shadow .2s;
      background: #fff;
    }
    .method-label:hover { border-color: var(--amber-lt); }
    .method-option input:checked + .method-label {
      border-color: var(--amber);
      background: rgba(232,129,42,.06);
      box-shadow: 0 0 0 3px rgba(232,129,42,.10);
    }
    .method-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--smoke);
    }
    .method-icon svg { width: 20px; height: 20px; }
    .method-option input:checked + .method-label .method-icon {
      background: rgba(232,129,42,.12);
    }
    .method-text { font-size: 11.5px; font-weight: 600; color: var(--ink); text-align: center; line-height: 1.3; }

    /* ── Pay Button ── */
    .pay-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--amber-dk), var(--amber) 60%, var(--amber-lt));
      background-size: 200% auto;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .02em;
      transition: background-position .4s, box-shadow .2s, transform .15s;
      box-shadow: 0 4px 20px rgba(232,129,42,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }
    .pay-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,.12), transparent);
      pointer-events: none;
    }
    .pay-btn:hover {
      background-position: right center;
      box-shadow: 0 6px 28px rgba(232,129,42,.45);
      transform: translateY(-1px);
    }
    .pay-btn:active { transform: translateY(0); }
    .pay-btn svg { width: 17px; height: 17px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .pay-btn.loading { pointer-events: none; opacity: .85; }
    .pay-btn .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer note ── */
    .secure-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
    }
    .secure-note svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 1.8; }

    /* ── Success State ── */
    .success-overlay {
      position: absolute;
      inset: 0;
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s;
      z-index: 10;
    }
    .success-overlay.show { opacity: 1; pointer-events: all; }

    .success-ring {
      width: 76px; height: 76px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2D7A52, #45B57A);
      display: grid;
      place-items: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 28px rgba(45,122,82,.3);
      animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
    .success-ring svg { width: 34px; height: 34px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    .success-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .success-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 280px;
    }
    .success-sub strong { color: var(--amber-dk); }

    .success-amount {
      margin: 20px 0;
      padding: 16px 28px;
      background: var(--smoke);
      border-radius: 12px;
      border: 1.5px solid var(--border);
    }
    .success-amount .amt-label { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .success-amount .amt-val { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--success); font-weight: 700; }

    .txn-id {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      font-family: 'Courier New', monospace;
      letter-spacing: .05em;
    }

    /* ── Field rows ── */
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ── Error shake ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-6px); }
      40%,80%  { transform: translateX(6px); }
    }
    .shake { animation: shake .35s ease; }
  </style>
</head>
<body>

<div class="card" id="mainCard">

  <!-- Header -->
  <div class="card-header">
    <div class="secure-badge">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      256-bit SSL
    </div>
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      </div>
      <span class="brand-name">SecurePay Gateway</span>
    </div>
    <div class="header-amount">
      <div class="header-label">Advance Payment Due</div>
      <div class="header-value">₹3,000</div>
    </div>
  </div>

  <!-- Body -->
  <div class="card-body">

    <!-- Steps -->
    <div class="steps">
      <div class="step active">
        <div class="step-dot">1</div>
        <span>Details</span>
      </div>
      <div class="step-line"></div>
      <div class="step active">
        <div class="step-dot">2</div>
        <span>Payment</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-dot">3</div>
        <span>Confirm</span>
      </div>
    </div>

    <form id="paymentForm" novalidate>

      <div class="section-label">Your Details</div>

      <div class="field">
        <label for="customerName">Full Name</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          </span>
          <input type="text" id="customerName" placeholder="Enter your full name" autocomplete="name" required/>
        </div>
      </div>

      <div class="field">
        <label for="customerEmail">Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
          </span>
          <input type="email" id="customerEmail" placeholder="you@example.com" autocomplete="email" required/>
        </div>
      </div>

      <div class="field">
        <label>Booking Amount</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </span>
          <input type="text" value="₹ 3,000" class="readonly-field" readonly/>
        </div>
      </div>

      <div class="section-label" style="margin-top:8px;">Payment Method</div>

      <div class="method-grid">
        <div class="method-option">
          <input type="radio" name="method" id="m-upi" value="UPI" required/>
          <label class="method-label" for="m-upi">
            <div class="method-icon">
              <!-- UPI icon -->
              <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="40" height="40" rx="8" fill="none"/>
                <text x="50%" y="56%" font-size="13" text-anchor="middle" dominant-baseline="middle" font-weight="700" fill="#E8812A" font-family="DM Sans, sans-serif">UPI</text>
              </svg>
            </div>
            <span class="method-text">UPI</span>
          </label>
        </div>
        <div class="method-option">
          <input type="radio" name="method" id="m-card" value="Card"/>
          <label class="method-label" for="m-card">
            <div class="method-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#E8812A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="5" width="20" height="14" rx="2"/>
                <line x1="2" y1="10" x2="22" y2="10"/>
              </svg>
            </div>
            <span class="method-text">Credit / Debit</span>
          </label>
        </div>
        <div class="method-option">
          <input type="radio" name="method" id="m-nb" value="NetBanking"/>
          <label class="method-label" for="m-nb">
            <div class="method-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#E8812A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
            </div>
            <span class="method-text">Net Banking</span>
          </label>
        </div>
      </div>

      <button type="submit" class="pay-btn" id="payBtn">
        <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        Pay ₹3,000 Securely
      </button>
    </form>

    <p class="secure-note">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Your payment is protected with end-to-end encryption
    </p>

  </div><!-- card-body -->

  <!-- Success Overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-ring">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-title">Payment Successful!</div>
    <p class="success-sub">Thank you, <strong id="successName"></strong>! A confirmation has been sent to <strong id="successEmail"></strong>.</p>

    <div class="success-amount">
      <div class="amt-label">Amount Paid</div>
      <div class="amt-val">₹3,000</div>
    </div>

    <p class="txn-id" id="txnId"></p>

    <p style="font-size:13px;color:var(--muted);margin-top:14px;">Redirecting to <strong id="successMethod"></strong> gateway…</p>
  </div>

</div><!-- card -->

<script>
  const form = document.getElementById('paymentForm');
  const payBtn = document.getElementById('payBtn');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const name   = document.getElementById('customerName').value.trim();
    const email  = document.getElementById('customerEmail').value.trim();
    const method = document.querySelector('input[name="method"]:checked');

    // Basic validation with shake
    if (!name || !email || !method) {
      payBtn.classList.add('shake');
      setTimeout(() => payBtn.classList.remove('shake'), 400);
      return;
    }

    // Loading state
    payBtn.classList.add('loading');
    payBtn.innerHTML = '<span class="spinner"></span> Processing…';

    // Simulate gateway delay
    setTimeout(() => {
      document.getElementById('successName').textContent = name;
      document.getElementById('successEmail').textContent = email;
      document.getElementById('successMethod').textContent = method.value;
      document.getElementById('txnId').textContent =
        'TXN ID: ' + Math.random().toString(36).substring(2,10).toUpperCase() + Date.now().toString().slice(-5);

      document.getElementById('successOverlay').classList.add('show');
    }, 1800);
  });
</script>

</body>
</html>
